name: CI Pipeline

# dev 또는 main 브랜치로 PR이 생성되거나 push될 때 CI를 실행한다.
on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

# OIDC 방식으로 AWS IAM Role을 사용하기 위해 id-token 쓰기 권한이 필요하다.
permissions:
  contents: read
  id-token: write

# 테스트와 이미지 푸시에 필요한 공통 환경변수.
# 민감 정보는 secrets, 공개 가능한 설정값은 vars를 사용한다.
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  JWT_ACCESS_TOKEN_EXPIRATION: ${{ vars.JWT_ACCESS_TOKEN_EXPIRATION }}
  ADMIN_WHITELIST_EMAILS: ${{ secrets.ADMIN_WHITELIST_EMAILS }}

  # CI에서는 GitHub Actions 서비스 컨테이너 Redis에 연결한다.
  REDISSON_ADDRESS: redis://localhost:6379

  PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
  PORTONE_CHANNEL_KEY: ${{ secrets.PORTONE_CHANNEL_KEY }}
  PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
  PORTONE_WEBHOOK_SECRET: ${{ secrets.PORTONE_WEBHOOK_SECRET }}

jobs:
  build-test-and-image:
    runs-on: ubuntu-latest

    # 테스트 중 Redisson 빈이 생성되므로 CI 내부 Redis를 함께 띄운다.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. GitHub 저장소의 소스 코드를 체크아웃한다.
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Spring Boot 애플리케이션 빌드를 위한 JDK 17 환경을 설정한다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3. Gradle Wrapper 실행 권한을 부여한다.
      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      # 4. 테스트를 실행한다. 테스트 실패 시 이후 단계는 실행되지 않는다.
      - name: Run Tests
        run: ./gradlew test --no-daemon

      # 5. Docker 이미지에 포함할 Spring Boot jar 파일을 생성한다.
      - name: Build Boot Jar
        run: ./gradlew bootJar -x test --no-daemon

      # 6. 커밋 해시 앞 7자리를 Docker 이미지 태그로 사용한다.
      - name: Set Docker Image Tag
        id: image
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # 7. ARM64 Docker 이미지를 빌드하기 위해 Docker Buildx를 설정한다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. PR 단계에서도 ARM64 Docker 이미지 빌드가 가능한지 검증한다.
      - name: Build ARM64 Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: tuna-app:${{ steps.image.outputs.tag }}

      # 9. push 이벤트에서만 OIDC로 AWS IAM Role을 Assume한다.
      - name: Configure AWS Credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # 10. Amazon ECR에 로그인한다.
      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 11. Docker 이미지를 ARM64로 빌드하여 커밋 해시 태그와 latest 태그로 ECR에 푸시한다.
      - name: Build and Push ARM64 Docker Image to ECR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      # 12. ECR에 푸시된 이미지를 EC2에서 pull 받아 새 컨테이너로 배포한다.
      - name: Deploy to EC2 with SSM
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_URI}" \
            --parameters commands="[
              \"set -e\",
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"docker pull ${IMAGE_URI}\",
              \"docker stop tuna-app || true\",
              \"docker rm tuna-app || true\",
              \"docker run -d --name tuna-app --restart unless-stopped -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod ${IMAGE_URI}\",
              \"i=1; while [ \\\"\\$i\\\" -le 30 ]; do if curl -fsS http://localhost:8080/actuator/health | grep -q '\\\"status\\\":\\\"UP\\\"'; then exit 0; fi; i=\\$((i + 1)); sleep 5; done\",
              \"docker logs --tail 200 tuna-app\",
              \"exit 1\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}"
          set -e

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "Status" \
            --output text)

          test "${STATUS}" = "Success"