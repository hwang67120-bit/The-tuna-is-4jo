name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:tuna;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      JWT_SECRET: Y2ktdGVzdC1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWxvbmctZW5vdWdoLWZvci1obWFjLXNpZ25pbmc=
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      ADMIN_WHITELIST_EMAILS: ci-admin@example.com
      REDISSON_ADDRESS: redis://127.0.0.1:6379
      PORTONE_API_SECRET: ci-test-api-secret
      PORTONE_STORE_ID: ci-test-store-id
      PORTONE_CHANNEL_KEY: ci-test-channel-key
      PORTONE_WEBHOOK_SECRET: dGVzdF9zZWNyZXRfa2V5X2Zvcl9iYXNlNjRfZGVjb2RpbmdfMTIzNDU2Nzg5MA==

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew clean build --no-daemon
