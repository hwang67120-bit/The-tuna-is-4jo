<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAVER</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <button class="menu-button" type="button" aria-label="menu">&#9776;</button>
    <button class="brand" type="button" data-view="home">SAVER</button>
    <nav class="main-nav">
      <button type="button" data-view="home">상품</button>
      <button type="button" data-view="cart">장바구니</button>
      <button type="button" data-view="profile">내 정보</button>
      <button type="button" data-admin-only data-view="admin">관리자 콘솔</button>
    </nav>
    <div class="session-bar">
      <span id="sessionLabel">로그인이 필요합니다</span>
      <button id="loginOpenButton" class="outline-button" type="button">로그인 / 회원가입</button>
      <button id="logoutButton" class="outline-button hidden" type="button">로그아웃</button>
    </div>
  </header>

  <main>
    <section id="homeView" class="view">
      <div class="hero-strip">
        <div>
          <p class="eyebrow">SAVER MARKET</p>
          <h1>지금 확인할 상품</h1>
        </div>
        <div class="hero-actions">
          <button class="pill" type="button" data-category="all">전체</button>
          <button class="pill" type="button" data-category="1">상의</button>
          <button class="pill" type="button" data-category="2">하의</button>
        </div>
      </div>
      <div id="productGrid" class="product-grid"></div>
    </section>

    <section id="detailView" class="view hidden">
      <button class="text-button" type="button" data-view="home">← 상품 목록</button>
      <div id="productDetail" class="detail-layout"></div>
    </section>

    <section id="cartView" class="view hidden">
      <div class="section-heading">
        <h2>장바구니</h2>
        <button id="refreshCartButton" class="outline-button" type="button">새로고침</button>
      </div>
      <div id="cartPanel" class="table-panel"></div>
    </section>

    <section id="profileView" class="view hidden">
      <div class="section-heading">
        <h2>회원정보</h2>
        <button id="loadProfileButton" class="outline-button" type="button">조회</button>
      </div>
      <div class="profile-table">
        <div class="row"><strong>회원 ID</strong><span id="profileMemberId">-</span></div>
        <div class="row"><strong>이메일</strong><span id="profileEmail">-</span></div>
        <div class="row"><strong>회원 권한</strong><span id="profileRole">-</span></div>
      </div>
      <div class="section-heading compact"><h2>개인정보 입력</h2></div>
      <form id="profileForm" class="profile-table form-table">
        <label class="row"><strong>이름</strong><input id="profileName" name="name" required></label>
        <label class="row"><strong>휴대폰번호</strong><input id="profilePhone" name="phoneNumber" required placeholder="010-1234-5678"></label>
        <div class="form-actions"><button class="primary-button small" type="submit">정보수정</button></div>
      </form>
    </section>

    <section id="adminView" class="view hidden">
      <div class="admin-shell">
        <aside class="admin-menu">
          <strong>SAVER Admin</strong>
          <button class="active" type="button">상품등록</button>
          <button type="button">상품재고/옵션</button>
          <button type="button" data-view="home">상품목록</button>
        </aside>
        <div class="admin-content">
          <h2>상품등록</h2>
          <div class="notice-box"><strong>!</strong><span>관리자 권한으로 상품 기본정보를 등록합니다.</span></div>
          <form id="productCreateForm" class="console-form">
            <h3>기본정보</h3>
            <label><span>카테고리 ID</span><input name="categoryId" type="number" min="1" value="1" required></label>
            <label><span>상품명</span><input name="name" required placeholder="오버핏 후드티"></label>
            <label><span>판매가</span><input name="price" type="number" min="0" required placeholder="39000"></label>
            <label><span>상세설명</span><textarea name="description" rows="5" placeholder="상세설명..."></textarea></label>
            <button class="primary-button" type="submit">상품 등록</button>
          </form>
          <form id="stockForm" class="console-form">
            <h3>대표 재고 설정</h3>
            <label><span>상품 ID</span><input name="productId" type="number" min="1" required></label>
            <label><span>재고 수량</span><input name="stockQuantity" type="number" min="0" required></label>
            <button class="outline-button" type="submit">재고 수정</button>
          </form>
          <form id="optionForm" class="console-form">
            <h3>옵션 상태 변경</h3>
            <label><span>상품 ID</span><input name="productId" type="number" min="1" required></label>
            <label><span>옵션 ID</span><input name="optionId" type="number" min="1" required></label>
            <label><span>옵션 재고</span><input name="optionStock" type="number" min="0" required></label>
            <label><span>추가 금액</span><input name="additionalPrice" type="number" min="0" value="0" required></label>
            <label><span>상태</span><select name="status"><option>ON_SALE</option><option>SOLDOUT</option><option>DISCONTINUED</option></select></label>
            <button class="outline-button" type="submit">옵션 수정</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="authModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="auth-panel">
      <button id="authCloseButton" class="close-button" type="button">&times;</button>
      <h2>SAVER</h2>
      <form id="loginForm" class="auth-form">
        <input name="email" type="email" placeholder="이메일" required>
        <input name="password" type="password" placeholder="비밀번호" required>
        <button class="login-button" type="submit">로그인</button>
      </form>
      <label class="keep-login"><input type="checkbox"> 로그인 상태 유지</label>
      <div class="auth-links"><button type="button" id="showSignupButton">회원가입</button></div>
      <form id="signupForm" class="auth-form hidden">
        <input name="email" type="email" placeholder="이메일" required>
        <input name="password" type="password" placeholder="비밀번호" required>
        <input name="name" placeholder="이름" required>
        <input name="phoneNumber" placeholder="010-1234-5678" required>
        <button class="outline-button full" type="submit">회원가입</button>
      </form>
    </div>
  </div>


  <aside id="supportWidget" class="support-widget hidden" aria-label="문의 위젯">
    <div class="support-card">
      <div class="support-header">
        <div class="support-logo">P</div>
        <div>
          <strong>SAVER 문의</strong>
          <button id="supportHoursButton" class="support-link" type="button">운영시간 보기</button>
        </div>
      </div>
      <section id="supportHomePanel" class="support-panel">
        <div class="support-greeting">
          <div class="support-small-logo">P</div>
          <div><strong>SAVER 문의</strong><p>안녕하세요.<br>궁금한 점을 남겨주시면 확인 후 답변드릴게요.</p></div>
        </div>
        <form id="supportCreateForm" class="support-form">
          <input name="title" maxlength="100" placeholder="문의 제목" required>
          <textarea name="content" rows="4" placeholder="문의 내용을 입력해 주세요" required></textarea>
          <button class="support-primary" type="submit">문의하기</button>
        </form>
        <div id="supportAdminPanel" class="support-admin hidden">
          <div class="support-section-title"><span>관리자 문의 목록</span><button id="supportRefreshButton" type="button">새로고침</button></div>
          <div id="supportChatList" class="support-chat-list"></div>
          <div id="supportChatDetail" class="support-chat-detail"></div>
        </div>
        <div class="support-time">오전 10:00부터 운영해요</div>
      </section>
      <section id="supportTalkPanel" class="support-panel hidden"><div id="supportTalkContent" class="support-empty">생성된 문의가 여기에 표시됩니다.</div></section>
      <section id="supportSettingsPanel" class="support-panel hidden"><div class="support-empty">로그인 상태와 문의 권한을 확인할 수 있어요.</div></section>
      <nav class="support-tabs">
        <button class="active" type="button" data-support-tab="home">홈</button>
        <button type="button" data-support-tab="talk">대화</button>
        <button type="button" data-support-tab="settings">설정</button>
      </nav>
    </div>
  </aside>
  <button id="supportToggleButton" class="support-toggle" type="button" aria-label="문의 열기">●</button>
  <div id="toast" class="toast hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
